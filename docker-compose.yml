version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: starter-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: starter_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: starter-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: node:20-alpine
    container_name: starter-api-dev
    working_dir: /app
    volumes:
      - .:/app:delegated
      - /app/node_modules
      - /app/apps/server/node_modules
      - /app/apps/client/node_modules
      - /app/apps/admin/node_modules
      - /app/packages/database/node_modules
      - /app/packages/eslint-config/node_modules
      - /app/packages/typescript-config/node_modules
    command: sh -c "corepack enable pnpm && pnpm install && npx prisma generate --schema=packages/database/prisma/schema.prisma && cd apps/server && pnpm run dev"
    ports:
      - "3002:3002"
    env_file:
      - ./apps/server/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/starter_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: